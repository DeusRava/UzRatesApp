name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Install dependencies
        run: npm install

      - name: Setup React Native Android project
        run: |
          npx @react-native-community/cli@13 init TempRN --version 0.73.6 --skip-install --directory /tmp/TempRN
          cp -r /tmp/TempRN/android ./android
          cp /tmp/TempRN/babel.config.js ./babel.config.js 2>/dev/null || true
          cp /tmp/TempRN/metro.config.js ./metro.config.js 2>/dev/null || true
          find android -type f \( -name "*.xml" -o -name "*.kt" -o -name "*.java" -o -name "*.gradle" \) | xargs sed -i "s/TempRN/UzRatesApp/g"

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build APK
        run: |
          cd android
          ./gradlew assembleRelease --no-daemon -x lint

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: UzRatesApp
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
